# Signature Block Definitions
#
# Structure: [jurisdiction.entity_type.execution_method]
#
# Placeholders:
#   {name}        — party name
#   {specifier}   — party specifier (e.g. ACN number)
#   {role}        — party role
#   {type}        — document type
#   {title}       — signatory title (in field values only)
#
# Field types:
#   type = "line"  — cell with bottom border (signature line)
#   (default)      — blank/text field
#
# Template intro supports **bold** markers.

# ============================================================================
# AUSTRALIA
# ============================================================================

[au.company.deed]
intro = "**Executed as a deed by {name}** ({specifier}) in accordance with section 127 of the Corporations Act 2001 (Cth):"
signatories = [
  { title = "Director" },
  { title = "Director/Secretary" },
]
fields = [
  { type = "line" },
  { label = "Name" },
  { label = "Title", value = "{title}" },
]
witness = false

[au.company.agreement]
intro = "**Signed for and on behalf of {name}** ({specifier}):"
signatories = [
  { title = "Director" },
  { title = "Director/Secretary" },
]
fields = [
  { type = "line" },
  { label = "Name" },
  { label = "Title", value = "{title}" },
]
witness = false

[au.individual.deed]
intro = "**Signed sealed and delivered by {name}**:"
signatories = [{}]
fields = [
  { type = "line" },
  { label = "Name", value = "{name}" },
  { label = "Date" },
]
witness = true
witness_fields = [
  { type = "line" },
  { label = "Witness name" },
  { label = "Address" },
]

[au.individual.agreement]
intro = "**Signed by {name}**:"
signatories = [{}]
fields = [
  { type = "line" },
  { label = "Name", value = "{name}" },
  { label = "Date" },
]
witness = false

[au.sole_director.deed]
intro = "**Executed as a deed by {name}** ({specifier}) by its sole director and sole company secretary in accordance with section 127 of the Corporations Act 2001 (Cth):"
signatories = [
  { title = "Sole Director and Sole Company Secretary" },
]
fields = [
  { type = "line" },
  { label = "Name" },
  { label = "Title", value = "{title}" },
]
witness = false

[au.sole_director.agreement]
intro = "**Signed for and on behalf of {name}** ({specifier}):"
signatories = [
  { title = "Sole Director and Sole Company Secretary" },
]
fields = [
  { type = "line" },
  { label = "Name" },
  { label = "Title", value = "{title}" },
]
witness = false

